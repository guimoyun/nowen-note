name: Build and Push Multi-Arch Docker Image

on:
  push:
    branches: [ "main" ]  # 推送到 main 分支时触发
  workflow_dispatch:      # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 QEMU (用于模拟多架构)
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx (支持多架构构建)
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 生成镜像元数据 (标签和注解)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/nowen-note
          tags: |
            type=sha,prefix=,format=short  # 基于 commit SHA 的标签，如：abc1234
            type=raw,value=latest          # latest 标签
            type=raw,value={{date 'YYYYMMDD'}}  # 日期标签，如：20260528

      - name: 构建并推送多架构 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64  # 🔥 关键：同时构建两个架构
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha               # 使用 GitHub Actions 缓存
          cache-to: type=gha,mode=max
          provenance: false                  # 可选：降低镜像大小
